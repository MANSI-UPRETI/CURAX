<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuraX Fitness Plan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#eef5ff,#f8fbff);
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#2563eb,#3b82f6);
  color:#fff;
  padding:25px;
}

.sidebar a {
  display:block;
  color:#fff;
  margin:12px 0;
  padding:10px;
  border-radius:10px;
  text-decoration:none;
}

.sidebar a:hover {
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main {
  margin-left:240px;
  padding:30px;
  max-width:1200px;
}

/* CARDS */
.card-box {
  background:rgba(255,255,255,0.8);
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
  height:100%;
}

.card-box:hover {
  transform:translateY(-5px);
}

.row > div {
  display:flex;
}

/* CALORIE CARD */
.calorie-card {
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  color: white;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.calorie-card::after {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  top: -30px;
  right: -30px;
}

.cal-icon {
  font-size: 28px;
  background: rgba(255,255,255,0.2);
  width: 55px;
  height: 55px;
  line-height: 55px;
  border-radius: 50%;
  margin: auto;
}

/* EXERCISE */
.exercise-card {
  background:#f1f5ff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
}

.exercise-card img {
  width:45px;
  height:45px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3><i class="fa fa-heartbeat"></i> CuraX</h3>
  <a href="Cura X Dashboard Page.html"><i class="fa fa-home"></i> Dashboard</a>
  <a href="Cura X Appointment Page.html"><i class="fa fa-heart"></i> Appointments</a>
  <a href="Cura X Mental Health Page.html"><i class="fa fa-brain"></i> Mental</a>
  <a href="Cura X Diet Plan Page.html"><i class="fa fa-apple-alt"></i> Diet</a>
  <a href="Cura X Fitness Plan Page.html"><i class="fa fa-dumbbell"></i> Fitness</a>
    <a href="CuraX Gamification Page.html"><i class="fa fa-gamepad"></i> Gamification</a>
</div>


<div class="main">

<h2 class="mb-4">Fitness Plan</h2>

<!-- TOP ROW -->
<div class="row g-4">

<div class="col-md-3">
<div class="card-box w-100">
<h6>Goal</h6>

<select id="goal" class="form-control mb-2">
<option>Weight Loss</option>
<option>Muscle Gain</option>
<option>General Fitness</option>
</select>

<select id="level" class="form-control mb-2">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>

<button class="btn btn-primary w-100" onclick="generateWorkout()">Generate</button>
</div>
</div>

<!-- PREMIUM CALORIES -->
<div class="col-md-3">
<div class="card-box calorie-card w-100">

<div class="cal-icon">
<i class="fa fa-fire"></i>
</div>

<h6 class="mt-2">Calories Burn</h6>

<h2 id="calories">0</h2>
<p>kcal today</p>

</div>
</div>

<div class="col-md-3">
<div class="card-box w-100 text-center">
<h6>Timer</h6>
<p id="timer">0 sec</p>

<div class="d-flex gap-2 justify-content-center">
<button class="btn btn-success btn-sm" onclick="startTimer()">Start</button>
<button class="btn btn-warning btn-sm" onclick="pauseTimer()">Pause</button>
<button class="btn btn-danger btn-sm" onclick="resetTimer()">Reset</button>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card-box w-100">
<h6>Progress</h6>

<input id="weight" class="form-control mb-2" placeholder="Weight">
<input id="reps" class="form-control mb-2" placeholder="Reps">

<button class="btn btn-primary w-100" onclick="updateProgress()">Update</button>
</div>
</div>

</div>

<!-- WORKOUT -->
<div class="row g-4 mt-2">

<div class="col-md-7">
<div class="card-box w-100">
<h5>Workout Plan</h5>
<div id="workout"></div>
</div>
</div>

<div class="col-md-5">
<div class="card-box w-100">
<h5>Weekly Split</h5>
<ul class="list-group list-group-flush">
<li class="list-group-item">Mon - Chest</li>
<li class="list-group-item">Tue - Back</li>
<li class="list-group-item">Wed - Legs</li>
<li class="list-group-item">Thu - Shoulders</li>
<li class="list-group-item">Fri - Arms</li>
<li class="list-group-item">Sat - Cardio</li>
<li class="list-group-item">Sun - Rest</li>
</ul>
</div>
</div>

</div>

<!-- CHART -->
<div class="card-box mt-3">
<h5>Calories Burn Chart</h5>
<canvas id="chart"></canvas>
</div>

</div>

<script>

function generateWorkout(){
 let goal=document.getElementById('goal').value;
 let list=document.getElementById('workout');

 let exercises=[
  {name:"Push Ups",img:"https://cdn-icons-png.flaticon.com/512/2964/2964514.png"},
  {name:"Squats",img:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png"},
  {name:"Plank",img:"https://cdn-icons-png.flaticon.com/512/2936/2936886.png"}
 ];

 if(goal=="Muscle Gain"){
  exercises=[
   {name:"Bench Press",img:"https://cdn-icons-png.flaticon.com/512/2964/2964514.png"},
   {name:"Deadlift",img:"https://cdn-icons-png.flaticon.com/512/3043/3043887.png"}
  ];
 }

 list.innerHTML = exercises.map(e =>
  `<div class='exercise-card'>
     <img src='${e.img}'>
     <span>${e.name}</span>
   </div>`
 ).join('');

 document.getElementById('calories').innerText = "400";
}

/* TIMER */
let time=0, interval;

function startTimer(){
 if(interval) return;
 interval=setInterval(()=>{
  time++;
  document.getElementById('timer').innerText=time+" sec";
 },1000);
}

function pauseTimer(){
 clearInterval(interval);
 interval=null;
}

function resetTimer(){
 clearInterval(interval);
 interval=null;
 time=0;
 document.getElementById('timer').innerText="0 sec";
}

/* PROGRESS */
function updateProgress(){
 alert("Progress Updated!");
}

/* PREMIUM CHART */
const ctx = document.getElementById('chart').getContext('2d');

const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, "rgba(59,130,246,0.5)");
gradient.addColorStop(1, "rgba(59,130,246,0)");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    datasets: [{
      label: 'Calories Burn',
      data: [200,300,250,400,350,450,380],
      fill: true,
      backgroundColor: gradient,
      borderColor: "#3b82f6",
      tension: 0.4,
      pointRadius: 4,
      pointBackgroundColor: "#3b82f6"
    }]
  },
  options: {
    plugins: {
      legend: { display: false }
    }
  }
});

</script>

</body>
</html>
